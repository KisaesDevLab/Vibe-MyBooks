# Every service uses the same logging config (json-file with rotation) and a
# sensible mem_limit so one container can't OOM-kill neighbors on a small VPS.
# Compose v2 honours top-level `x-*` anchors; the per-service merges are
# explicit below so operators can see exactly what each service gets.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kisbooks}
      # Refuse to start if POSTGRES_PASSWORD is not set in .env. A shared
      # default across installations is worse than a loud failure — operators
      # who see the error fix it once; operators who inherit a default hang
      # onto it forever.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-kisbooks}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_HOST_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kisbooks}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Postgres at rest with a few tenants sits under 256MB; 1GB gives room for
    # query workspace + backup dumps without risking OOM on a 2GB VPS.
    mem_limit: ${DB_MEM_LIMIT:-1g}
    mem_reservation: 256m
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: ${REDIS_MEM_LIMIT:-256m}
    logging: *default-logging

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kisbooks}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — put it in .env, do not run with the default}@db:5432/${POSTGRES_DB:-kisbooks}
      REDIS_URL: redis://redis:6379
      TAILSCALE_SOCKET_PATH: /var/run/tailscale/tailscaled.sock
      # Both crypto keys wrap data at rest. Compose refuses to start without
      # them — rotating a key in place silently corrupts every encrypted row,
      # so a loud boot-time error is strictly better than a wrong default.
      # Generate with: openssl rand -hex 32  (produces 64 hex chars)
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env (64 hex chars — generate with `openssl rand -hex 32`). The in-repo scripts/install.sh does this automatically.}
      PLAID_ENCRYPTION_KEY: ${PLAID_ENCRYPTION_KEY:?PLAID_ENCRYPTION_KEY must be set in .env (64 hex chars — generate with `openssl rand -hex 32`). Despite the name this wraps all encrypted-at-rest data (Plaid + Stripe + OAuth + TFA).}
    volumes:
      # Host bind mount — attachments, backups, and generated files live on
      # disk next to the compose file so they can be inspected, backed up
      # with standard tools, and survive `docker volume prune`.
      - ./data:/data
      # Read-only access to the Tailscale sidecar socket for super-admin
      # remote-access management. Works on any Docker host OS.
      - ts-socket:/var/run/tailscale:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Puppeteer/Chromium for PDF gen uses 200-400MB per render; 1GB ceiling
    # covers concurrent requests without leaving room for a runaway.
    mem_limit: ${API_MEM_LIMIT:-1g}
    mem_reservation: 256m
    logging: *default-logging

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${VITE_PORT:-5173}:5173"
    depends_on:
      - api
    mem_limit: ${WEB_MEM_LIMIT:-128m}
    logging: *default-logging

  worker:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    command: ["npx", "tsx", "packages/worker/src/index.ts"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kisbooks}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — put it in .env, do not run with the default}@db:5432/${POSTGRES_DB:-kisbooks}
      REDIS_URL: redis://redis:6379
      # Worker shares the api image and reads the same encrypted rows, so it
      # needs the identical key guards. Keep these in sync with the api block.
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env (64 hex chars — generate with `openssl rand -hex 32`).}
      PLAID_ENCRYPTION_KEY: ${PLAID_ENCRYPTION_KEY:?PLAID_ENCRYPTION_KEY must be set in .env (64 hex chars — generate with `openssl rand -hex 32`).}
    volumes:
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: ${WORKER_MEM_LIMIT:-512m}
    mem_reservation: 128m
    logging: *default-logging

  # Tailscale sidecar — joins the appliance to a tailnet so super-admins can
  # reach MyBooks remotely without opening inbound ports. Userspace networking
  # (TS_USERSPACE=true) keeps the container portable across Linux, Windows
  # Docker Desktop, macOS, and Raspberry Pi without needing NET_ADMIN / tun.
  tailscale:
    # Pinned Tailscale release. Using :latest makes every `docker
    # compose up` fetch a different image, so a breaking change in
    # userspace networking or tsnet API can ship silently mid-deploy.
    # Bump this in a tracked PR when a new release is tested against
    # the appliance.
    image: tailscale/tailscale:v1.76.1
    hostname: ${TS_HOSTNAME:-mybooks}
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SOCKET: /var/run/tailscale/tailscaled.sock
      TS_USERSPACE: "true"
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:---ssh=false}
    volumes:
      - ts-state:/var/lib/tailscale
      - ts-socket:/var/run/tailscale
    mem_limit: ${TS_MEM_LIMIT:-128m}
    logging: *default-logging

volumes:
  pgdata:
  redis-data:
  ts-state:
  ts-socket:
