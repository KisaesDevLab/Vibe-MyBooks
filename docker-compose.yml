# Every service uses the same logging config (json-file with rotation) and a
# sensible mem_limit so one container can't OOM-kill neighbors on a small VPS.
# Compose v2 honours top-level `x-*` anchors; the per-service merges are
# explicit below so operators can see exactly what each service gets.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kisbooks}
      # Refuse to start if POSTGRES_PASSWORD is not set in .env. A shared
      # default across installations is worse than a loud failure — operators
      # who see the error fix it once; operators who inherit a default hang
      # onto it forever.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-kisbooks}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_HOST_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kisbooks}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Postgres at rest with a few tenants sits under 256MB; 1GB gives room for
    # query workspace + backup dumps without risking OOM on a 2GB VPS.
    mem_limit: ${DB_MEM_LIMIT:-1g}
    mem_reservation: 256m
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: ${REDIS_MEM_LIMIT:-256m}
    logging: *default-logging

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kisbooks}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — put it in .env, do not run with the default}@db:5432/${POSTGRES_DB:-kisbooks}
      REDIS_URL: redis://redis:6379
      TAILSCALE_SOCKET_PATH: /var/run/tailscale/tailscaled.sock
      # Both crypto keys wrap data at rest. Compose refuses to start without
      # them — rotating a key in place silently corrupts every encrypted row,
      # so a loud boot-time error is strictly better than a wrong default.
      # Generate with: openssl rand -hex 32  (produces 64 hex chars)
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env (64 hex chars — generate with `openssl rand -hex 32`). The in-repo scripts/install.sh does this automatically.}
      PLAID_ENCRYPTION_KEY: ${PLAID_ENCRYPTION_KEY:?PLAID_ENCRYPTION_KEY must be set in .env (64 hex chars — generate with `openssl rand -hex 32`). Despite the name this wraps all encrypted-at-rest data (Plaid + Stripe + OAuth + TFA).}
    volumes:
      # Host bind mount — attachments, backups, and generated files live on
      # disk next to the compose file so they can be inspected, backed up
      # with standard tools, and survive `docker volume prune`.
      # `:z` applies a shared SELinux label on hosts that enforce MAC
      # (Fedora/RHEL/CentOS). Silently ignored on every other host, so
      # this is safe as a universal default. Without it, SELinux blocks
      # the container from writing to the bind-mounted host dir — and
      # the error surfaces as a bewildering EACCES rather than anything
      # obviously labeled "SELinux".
      - ./data:/data:z
      # Read-only access to the Tailscale sidecar socket for super-admin
      # remote-access management. Works on any Docker host OS.
      - ts-socket:/var/run/tailscale:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Puppeteer/Chromium for PDF gen uses 200-400MB per render; 1GB ceiling
    # covers concurrent requests without leaving room for a runaway.
    mem_limit: ${API_MEM_LIMIT:-1g}
    mem_reservation: 256m
    # Same healthcheck the prod Dockerfile bakes in, surfaced here so the
    # dev image (which doesn't have HEALTHCHECK inside its Dockerfile)
    # gets Starting/Healthy/Unhealthy states in `docker compose ps`
    # instead of just "Up" the instant the node process starts.
    # start_period gives preflight + migrations time to run on first boot.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging: *default-logging

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        # Pass feature flags through at build time — Vite bakes them
        # into the JS bundle, so flipping these requires `docker compose
        # build web` to take effect. See packages/web/src/utils/feature-flags.ts.
        VITE_ENTRY_FORMS_V2: ${VITE_ENTRY_FORMS_V2:-true}
    restart: unless-stopped
    ports:
      - "${VITE_PORT:-5173}:5173"
    depends_on:
      - api
    mem_limit: ${WEB_MEM_LIMIT:-128m}
    logging: *default-logging

  worker:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    command: ["npx", "tsx", "packages/worker/src/index.ts"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kisbooks}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — put it in .env, do not run with the default}@db:5432/${POSTGRES_DB:-kisbooks}
      REDIS_URL: redis://redis:6379
      # Worker shares the api image and reads the same encrypted rows, so it
      # needs the identical key guards. Keep these in sync with the api block.
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env (64 hex chars — generate with `openssl rand -hex 32`).}
      PLAID_ENCRYPTION_KEY: ${PLAID_ENCRYPTION_KEY:?PLAID_ENCRYPTION_KEY must be set in .env (64 hex chars — generate with `openssl rand -hex 32`).}
    volumes:
      # `:z` applies a shared SELinux label on hosts that enforce MAC
      # (Fedora/RHEL/CentOS). Silently ignored on every other host, so
      # this is safe as a universal default. Without it, SELinux blocks
      # the container from writing to the bind-mounted host dir — and
      # the error surfaces as a bewildering EACCES rather than anything
      # obviously labeled "SELinux".
      - ./data:/data:z
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: ${WORKER_MEM_LIMIT:-512m}
    mem_reservation: 128m
    logging: *default-logging

  # Tailscale sidecar — joins the appliance to a tailnet so super-admins can
  # reach MyBooks remotely without opening inbound ports. Userspace networking
  # (TS_USERSPACE=true) keeps the container portable across Linux, Windows
  # Docker Desktop, macOS, and Raspberry Pi without needing NET_ADMIN / tun.
  tailscale:
    # Pinned Tailscale release. Using :latest makes every `docker
    # compose up` fetch a different image, so a breaking change in
    # userspace networking or tsnet API can ship silently mid-deploy.
    # Bump this in a tracked PR when a new release is tested against
    # the appliance.
    image: tailscale/tailscale:v1.76.1
    hostname: ${TS_HOSTNAME:-mybooks}
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SOCKET: /var/run/tailscale/tailscaled.sock
      TS_USERSPACE: "true"
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:---ssh=false}
    volumes:
      - ts-state:/var/lib/tailscale
      - ts-socket:/var/run/tailscale
    mem_limit: ${TS_MEM_LIMIT:-128m}
    logging: *default-logging

  # GLM-OCR sidecar — local llama.cpp server serving the GLM-OCR
  # GGUF model over an OpenAI-compatible /v1/chat/completions endpoint.
  # See github.com/KisaesDevLab/Vibe-GLM-OCR for the appliance source
  # and the OCR_PORT default (8090).
  #
  # Gated behind the `glm-ocr` compose profile so single-firm appliances
  # that send OCR to a cloud provider (Anthropic vision, etc.) don't
  # have to run the model locally. To enable:
  #
  #   docker compose --profile glm-ocr up -d
  #
  # After bringing the sidecar up, configure the API to talk to it via
  # the admin UI: set "GLM-OCR base URL" to http://glm-ocr:8090 (the
  # internal compose hostname) and pick the local mode in the
  # provider dropdown. Models live in /models inside the container —
  # the GLM_OCR_IMAGE default ships the GGUF baked in; override
  # GLM_OCR_IMAGE in .env to use a custom appliance build.
  #
  # First boot is slow (~10–30s) while the model file mmap-loads;
  # the healthcheck polls /health which the appliance only exposes
  # once the model has finished loading.
  glm-ocr:
    image: ${GLM_OCR_IMAGE:-ghcr.io/kisaesdevlab/vibe-glm-ocr:latest}
    restart: unless-stopped
    profiles: ["glm-ocr"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8090/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      # First boot on an empty cache pulls multi-GB GGUF weights and
      # mmap-loads them — comfortably exceeds 60s on slower disks or
      # links. 180s default; tighten via GLM_OCR_START_PERIOD on
      # warm appliances if the wait is annoying.
      start_period: ${GLM_OCR_START_PERIOD:-180s}
    # 4 GB ceiling covers the model's resident set on a small VPS
    # (the GGUF Q4_K_M weights sit around 2.5 GB; the rest is the
    # llama.cpp KV cache). Operators on bigger boxes should bump
    # GLM_OCR_MEM_LIMIT in .env to reduce OOM risk on long jobs.
    mem_limit: ${GLM_OCR_MEM_LIMIT:-4g}
    mem_reservation: 1g
    # Persistent cache for downloaded model files. Without this, every
    # `docker compose up` re-downloads the GGUF — fine for small
    # models (a few hundred MB) but painful for the multi-GB GLM-OCR
    # weights. The appliance writes to /models by convention.
    volumes:
      - glm-ocr-models:/models
    logging: *default-logging

  # Cloudflare Tunnel sidecar — see Build Plans/CLOUDFLARE_TUNNEL_PLAN.md.
  # Customer-owned Cloudflare account model: the firm creates the tunnel in
  # their own CF dashboard (setup guide Part D), pastes the token into .env,
  # and this sidecar establishes the outbound tunnel — no inbound port
  # forwarding on the appliance's router.
  #
  # Gated behind the `tunnel` compose profile so LAN-only installs do not
  # need a Cloudflare account. To enable: `docker compose --profile tunnel up -d`.
  # The sidecar is on the default Compose network alongside `api` + `web`
  # so CF ingress rules can address them by Compose service name
  # (`api:3001`, `web:5173`). No published host ports — traffic enters via
  # Cloudflare's edge, never this container's port.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    # --no-autoupdate: the image tag controls the version on purpose;
    # silent in-place upgrades inside a long-running sidecar have broken
    # token formats across Cloudflare releases before.
    #
    # --metrics 0.0.0.0:2000 exposes the Prometheus endpoint to the
    # Compose network (never to the host) so the api container can
    # scrape tunnel status. See CLOUDFLARE_TUNNEL_PLAN Phase 8.
    #
    # NB: we can't use `${VAR:?msg}` here because Compose evaluates
    # interpolation at parse time, even for services gated behind a
    # profile — so LAN-only installs without a CF token would see the
    # error on every `docker compose up`. Using `${VAR:-}` lets the
    # value be empty at parse time; cloudflared itself fails loudly
    # (and keeps restarting) if given no token, which is the correct
    # signal when the operator opts into --profile tunnel without
    # completing the setup guide.
    command: ["tunnel", "--no-autoupdate", "--metrics", "0.0.0.0:2000", "run", "--token", "${CLOUDFLARE_TUNNEL_TOKEN:-}"]
    depends_on:
      api:
        condition: service_healthy
    # 128MB is comfortable — cloudflared sits under 40MB in steady state;
    # the ceiling exists so a runaway retry loop cannot starve neighbours.
    mem_limit: ${CLOUDFLARED_MEM_LIMIT:-128m}
    mem_reservation: 32m
    logging: *default-logging

volumes:
  pgdata:
  redis-data:
  ts-state:
  ts-socket:
  # GLM-OCR model cache (only populated when the `glm-ocr` profile is
  # active; benign empty volume otherwise). Survives `docker compose
  # down` so the next `up` doesn't re-download multi-GB weights.
  glm-ocr-models:
