services:
  app:
    # Pre-built image from GHCR — installs pull this instead of building
    # locally. Pin a specific release via VIBE_MYBOOKS_TAG in .env.
    # The build: stanza is kept so `docker compose build` still works for
    # contributors who cloned the repo and want to exercise the Dockerfile.
    image: ghcr.io/kisaesdevlab/vibe-mybooks:${VIBE_MYBOOKS_TAG:-latest}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://kisbooks:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env for production}@db:5432/kisbooks
      REDIS_URL: redis://redis:6379
      # Required crypto keys — compose refuses to start without them.
      # Generate with: openssl rand -hex 32  (produces 64 hex chars).
      # scripts/install.sh does this automatically on fresh install.
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env (64 hex chars — `openssl rand -hex 32`). scripts/install.sh mints one automatically.}
      PLAID_ENCRYPTION_KEY: ${PLAID_ENCRYPTION_KEY:?PLAID_ENCRYPTION_KEY must be set in .env (64 hex chars — `openssl rand -hex 32`). Wraps all encrypted-at-rest data, not only Plaid.}
    volumes:
      # Host bind mount — see docker-compose.yml for rationale. Data lives at
      # <compose-dir>/data so it can be backed up, inspected, and migrated
      # with standard file tools.
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kisbooks
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env for production}
      POSTGRES_DB: kisbooks
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kisbooks"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redis-data:
