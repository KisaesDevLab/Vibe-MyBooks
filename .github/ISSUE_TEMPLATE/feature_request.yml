name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Vibe MyBooks? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what workflow does it improve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like this to work from a user's perspective.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or alternative approaches you've thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Transactions
        - Invoicing / Sales
        - Banking
        - Bills / AP
        - Reports
        - Chart of Accounts
        - AI / Chat
        - Admin / Settings
        - API / Integrations
        - Authentication
        - Other
    validations:
      required: true
