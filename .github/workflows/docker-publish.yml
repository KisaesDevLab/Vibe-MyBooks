name: Build & publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  # cosign sign (keyless) attaches a signature to the published image
  # by calling Sigstore's Fulcio + Rekor via the GitHub OIDC identity
  # token. `id-token: write` grants that identity; without it cosign's
  # keyless flow has no way to prove "this signature came from this
  # workflow run".
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vibe-mybooks

# Previously this built linux/amd64 + linux/arm64 on a single ubuntu-latest
# runner with QEMU. The arm64 emulation of a Node.js monorepo (installs +
# tsc + vite build) pushed every run past 2 hours — some hit the queue
# timeout, others were manually cancelled. Split into a matrix of native
# runners (amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm, both free
# for public repos) and assemble a multi-arch manifest from the per-arch
# digests. Typical build time drops from 2h+ to ~10 min per arch in
# parallel.

jobs:
  license-check:
    uses: ./.github/workflows/license-check.yml
    permissions:
      contents: read
      issues: write

  ci:
    # Run typecheck + unit tests before burning the build hours. A
    # failing test shouldn't ship to GHCR.
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  build:
    needs: [license-check, ci]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Lowercase image name
        id: image
        run: echo "name=${REGISTRY,,}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Platform pair
        id: pair
        run: |
          platform=${{ matrix.platform }}
          echo "pair=${platform//\//-}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.pair.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ steps.pair.outputs.pair }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ steps.pair.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Lowercase image name
        id: image
        run: echo "name=${REGISTRY,,}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=sha,prefix=main-,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.image.outputs.name }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.version }}

      # Resolve the manifest-list digest once so the SBOM + signature
      # steps both reference the exact same image.
      - name: Resolve manifest digest
        id: digest
        run: |
          DIGEST=$(docker buildx imagetools inspect ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.version }} --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign published image (keyless)
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: |
          cosign sign --yes "${{ steps.image.outputs.name }}@${{ steps.digest.outputs.digest }}"

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
      - name: Generate + attach CycloneDX SBOM
        run: |
          syft "${{ steps.image.outputs.name }}@${{ steps.digest.outputs.digest }}" \
            -o cyclonedx-json=sbom.cdx.json
      - name: Attest SBOM to image
        uses: actions/attest-sbom@v3
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          sbom-path: sbom.cdx.json
          push-to-registry: true
