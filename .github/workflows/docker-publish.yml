name: Build & publish Docker images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  # cosign sign (keyless) attaches a signature to the published image
  # by calling Sigstore's Fulcio + Rekor via the GitHub OIDC identity
  # token. `id-token: write` grants that identity; without it cosign's
  # keyless flow has no way to prove "this signature came from this
  # workflow run".
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  # Owner-level prefix; per-image suffix lives in the matrix below
  # (vibe-distribution-plan §image publishing).
  OWNER: ${{ github.repository_owner }}

# vibe-distribution-plan D8 — multi-image release pipeline.
#
# Three images come out of every tagged commit:
#
#   ghcr.io/<owner>/vibe-mybooks-api      (Express + the worker code)
#   ghcr.io/<owner>/vibe-mybooks-web      (nginx + Vite-built SPA)
#   ghcr.io/<owner>/vibe-mybooks-worker   (alias of -api so prod compose
#                                           can pin both with the same
#                                           VIBE_MYBOOKS_VERSION)
#
# Worker is published as a tag-alias rather than a separate build —
# the artifact bytes are identical to -api, only the entrypoint
# differs (set by `command:` in compose). Tagging both names against
# the same digest keeps a deploy atomic and halves CI time.
#
# Architecture: per-arch builds run on native runners (amd64 on
# ubuntu-latest, arm64 on ubuntu-24.04-arm — both free for public
# repos). QEMU emulation of an arm64 Node.js monorepo build pushed
# every run past 2 hours; native runners drop that to ~10 min per
# arch. The merge job assembles a multi-arch manifest list, signs
# it with cosign keyless OIDC, and attests a CycloneDX SBOM via
# the actions/attest-sbom action.

jobs:
  license-check:
    uses: ./.github/workflows/license-check.yml
    permissions:
      contents: read
      issues: write

  ci:
    # Run typecheck + unit tests before burning the build hours. A
    # failing test shouldn't ship to GHCR.
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  build:
    needs: [license-check, ci]
    strategy:
      fail-fast: false
      matrix:
        target:
          - image: vibe-mybooks-api
            dockerfile: packages/api/Dockerfile
          - image: vibe-mybooks-web
            dockerfile: packages/web/Dockerfile
        platform:
          - { name: linux/amd64, runner: ubuntu-latest }
          - { name: linux/arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image name
        id: image
        run: |
          IMAGE="${REGISTRY,,}/${OWNER,,}/${{ matrix.target.image }}"
          echo "name=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Platform pair
        id: pair
        run: |
          platform=${{ matrix.platform.name }}
          echo "pair=${platform//\//-}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./${{ matrix.target.dockerfile }}
          platforms: ${{ matrix.platform.name }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          # Cache scope is keyed on (image, arch) so the api and web
          # builds don't poison each other's cache.
          cache-from: type=gha,scope=${{ matrix.target.image }}-${{ steps.pair.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target.image }}-${{ steps.pair.outputs.pair }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          # Artifact name encodes (image, arch) so the merge job can
          # download exactly the digests for the image it's merging.
          name: digests-${{ matrix.target.image }}-${{ steps.pair.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        target:
          - vibe-mybooks-api
          - vibe-mybooks-web
    steps:
      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          # Only this image's per-arch digests; the build job uploaded
          # them with the image name embedded so the pattern selects
          # exactly two files (one per arch).
          pattern: digests-${{ matrix.target }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image name
        id: image
        run: echo "name=${REGISTRY,,}/${OWNER,,}/${{ matrix.target }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=sha,prefix=main-,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.image.outputs.name }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.version }}

      # Resolve the manifest-list digest once so the SBOM + signature
      # steps both reference the exact same image.
      - name: Resolve manifest digest
        id: digest
        run: |
          DIGEST=$(docker buildx imagetools inspect ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.version }} --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign published image (keyless)
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: |
          cosign sign --yes "${{ steps.image.outputs.name }}@${{ steps.digest.outputs.digest }}"

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
      - name: Generate + attach CycloneDX SBOM
        run: |
          syft "${{ steps.image.outputs.name }}@${{ steps.digest.outputs.digest }}" \
            -o cyclonedx-json=sbom.cdx.json
      - name: Attest SBOM to image
        uses: actions/attest-sbom@v3
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          sbom-path: sbom.cdx.json
          push-to-registry: true

  # vibe-distribution-plan: tag the api image's manifest list under a
  # second name (-worker) so prod compose can pin both api and worker
  # to the same VIBE_MYBOOKS_VERSION. No new bytes are pushed —
  # `imagetools create` produces a tag alias against the same digest.
  # The alias is signed + SBOM-attested independently so downstream
  # cosign-verify policies treat the worker image as a first-class
  # published artifact (verifiers don't follow tag indirection).
  worker-alias:
    runs-on: ubuntu-latest
    needs: merge
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute names
        id: names
        run: |
          echo "api=${REGISTRY,,}/${OWNER,,}/vibe-mybooks-api" >> "$GITHUB_OUTPUT"
          echo "worker=${REGISTRY,,}/${OWNER,,}/vibe-mybooks-worker" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (worker)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.names.outputs.worker }}
          # Match the merge job's tag rules verbatim so worker:1.4.2
          # and api:1.4.2 always pair, including the main-branch
          # `:latest` and `main-<sha>` rolling tags.
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=sha,prefix=main-,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Tag api image as worker
        id: alias
        run: |
          # Source the api manifest by its primary metadata tag (the
          # same tag generation rules produce identical first entries
          # for both jobs because they both consume the same git ref).
          API_PRIMARY=$(jq -cr '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON" | sed 's|vibe-mybooks-worker|vibe-mybooks-api|')
          echo "Source: ${API_PRIMARY}"
          for tag in $(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON"); do
            echo "Aliasing -> ${tag}"
            docker buildx imagetools create -t "${tag}" "${API_PRIMARY}"
          done
          # Resolve the digest of the alias once for sign + SBOM
          # steps. GHCR can take a few seconds to make a freshly-
          # pushed manifest list visible to a follow-up `imagetools
          # inspect` — retry up to 5×2s before giving up so a slow
          # registry doesn't fail the whole release.
          PRIMARY_TAG=$(jq -cr '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          DIGEST=""
          for attempt in 1 2 3 4 5; do
            DIGEST=$(docker buildx imagetools inspect "${PRIMARY_TAG}" --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"' || true)
            if [ -n "$DIGEST" ]; then break; fi
            echo "imagetools inspect returned empty digest on attempt ${attempt}; retrying in 2s..."
            sleep 2
          done
          if [ -z "$DIGEST" ]; then
            echo "::error::Failed to resolve worker-alias digest after 5 attempts" >&2
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign worker alias (keyless)
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: |
          cosign sign --yes "${{ steps.names.outputs.worker }}@${{ steps.alias.outputs.digest }}"

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
      - name: Generate worker-alias CycloneDX SBOM
        run: |
          syft "${{ steps.names.outputs.worker }}@${{ steps.alias.outputs.digest }}" \
            -o cyclonedx-json=sbom-worker.cdx.json
      - name: Attest SBOM to worker alias
        uses: actions/attest-sbom@v3
        with:
          subject-name: ${{ steps.names.outputs.worker }}
          subject-digest: ${{ steps.alias.outputs.digest }}
          sbom-path: sbom-worker.cdx.json
          push-to-registry: true
