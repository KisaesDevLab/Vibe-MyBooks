name: CI

# Gate main + PRs on the full test matrix. Before this workflow was
# added, main was protected only by license-check + migration-policy +
# docker-build — a TypeScript regression or a red vitest file could
# land in GHCR without anyone noticing. The docker-publish workflow
# now explicitly `needs:` this one.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        # --ignore-scripts avoids running Puppeteer's Chromium download
        # and husky hook install during CI; neither is needed for
        # typecheck / test, and the workflow explicitly performs
        # anything it needs below.
        run: npm ci --ignore-scripts
      - name: Build shared
        run: npm run build --workspace=@kis-books/shared
      - name: Typecheck api
        run: npx tsc --noEmit
        working-directory: packages/api
      - name: Typecheck web
        run: npx tsc -b --noEmit
        working-directory: packages/web
      - name: Typecheck worker
        run: npx tsc --noEmit
        working-directory: packages/worker
      - name: Guard against new `any` types
        # CLAUDE.md #14 bans `any`; we carry a baseline for pre-existing
        # occurrences and this step fails the build if the count grows.
        # Debt paydown is expected (the script prints "update BASELINE_*").
        run: npm run any:check

  test:
    runs-on: ubuntu-latest
    services:
      # Mirror the dev/test DB setup. test-setup.ts points vitest at
      # postgresql://kisbooks:kisbooks@localhost:5434/kisbooks_test —
      # align the port/creds with that URL so the same code paths run.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kisbooks
          POSTGRES_PASSWORD: kisbooks
          POSTGRES_DB: kisbooks_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U kisbooks"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Build shared
        run: npm run build --workspace=@kis-books/shared
      - name: Run migrations against test DB
        env:
          DATABASE_URL: postgresql://kisbooks:kisbooks@localhost:5434/kisbooks_test
        # migrate.ts resolves `./packages/api/src/db/migrations` relative
        # to cwd, so run it from the repo root — not from packages/api.
        run: npx tsx packages/api/src/db/migrate.ts
      - name: Run api unit tests
        env:
          DATABASE_URL: postgresql://kisbooks:kisbooks@localhost:5434/kisbooks_test
          JWT_SECRET: test-secret-key-for-testing-only
        run: npm test
        working-directory: packages/api
      - name: Run shared unit tests
        run: npm test
        working-directory: packages/shared
      - name: Run web unit tests
        run: npm test
        working-directory: packages/web

  # E2E is kept separate because it needs a live api+web stack. We run
  # it as a best-effort in CI via docker compose — failures here don't
  # currently gate merge, but the job is surfaced so regressions are
  # visible. Flip `continue-on-error` to false once it's stable in CI.
  e2e:
    runs-on: ubuntu-latest
    needs: typecheck
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Bring up stack
        env:
          POSTGRES_PASSWORD: ci-only-password
          JWT_SECRET: ci-only-jwt-secret-at-least-20-chars
        run: |
          docker compose -f docker-compose.yml up -d db redis
          # Give services a moment to come up; healthchecks should gate this
          sleep 10
      - name: Run Playwright
        run: npx playwright test
        working-directory: e2e
