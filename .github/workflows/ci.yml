name: CI

# Gate main + PRs on the full test matrix. Before this workflow was
# added, main was protected only by license-check + migration-policy +
# docker-build — a TypeScript regression or a red vitest file could
# land in GHCR without anyone noticing. The docker-publish workflow
# now explicitly `needs:` this one.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        # --ignore-scripts avoids running Puppeteer's Chromium download
        # and husky hook install during CI; neither is needed for
        # typecheck / test, and the workflow explicitly performs
        # anything it needs below.
        run: npm ci --ignore-scripts
      - name: Build shared
        run: npm run build --workspace=@kis-books/shared
      - name: Typecheck api
        run: npx tsc --noEmit
        working-directory: packages/api
      - name: Typecheck web
        run: npx tsc -b --noEmit
        working-directory: packages/web
      - name: Typecheck worker
        run: npx tsc --noEmit
        working-directory: packages/worker
      - name: Guard against new `any` types
        # CLAUDE.md #14 bans `any`; we carry a baseline for pre-existing
        # occurrences and this step fails the build if the count grows.
        # Debt paydown is expected (the script prints "update BASELINE_*").
        run: npm run any:check

  test:
    runs-on: ubuntu-latest
    services:
      # Mirror the dev/test DB setup. test-setup.ts points vitest at
      # postgresql://kisbooks:kisbooks@localhost:5434/kisbooks_test —
      # align the port/creds with that URL so the same code paths run.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kisbooks
          POSTGRES_PASSWORD: kisbooks
          POSTGRES_DB: kisbooks_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U kisbooks"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Build shared
        run: npm run build --workspace=@kis-books/shared
      - name: Run migrations against test DB
        env:
          DATABASE_URL: postgresql://kisbooks:kisbooks@localhost:5434/kisbooks_test
        # migrate.ts resolves `./packages/api/src/db/migrations` relative
        # to cwd, so run it from the repo root — not from packages/api.
        run: npx tsx packages/api/src/db/migrate.ts
      - name: Run api unit tests
        env:
          DATABASE_URL: postgresql://kisbooks:kisbooks@localhost:5434/kisbooks_test
          JWT_SECRET: test-secret-key-for-testing-only
        run: npm test
        working-directory: packages/api
      - name: Run shared unit tests
        run: npm test
        working-directory: packages/shared
      - name: Run web unit tests
        run: npm test
        working-directory: packages/web

  # E2E runs the full api+web+worker stack via docker compose and hits
  # it with Playwright. The job was previously a no-op — the step only
  # started db+redis, and even that failed because compose refused to
  # interpolate the required ENCRYPTION_KEY / PLAID_ENCRYPTION_KEY guards
  # on the api + worker services. Now: we synthesize a CI-only .env with
  # throwaway 64-hex secrets, bring up db+redis+api+web+worker with
  # `--wait` so healthchecks gate playwright, and run the suite.
  # `continue-on-error: true` remains until a few consecutive clean
  # runs prove stability; flipping it to false is a follow-up PR.
  e2e:
    runs-on: ubuntu-latest
    needs: typecheck
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Synthesize CI-only .env
        # docker-compose.yml interpolates ${ENCRYPTION_KEY:?...} etc. and
        # also references `env_file: .env` on api + worker. Both the
        # interpolation and the env_file need to be satisfied; writing a
        # real .env file covers both. Values are throwaway — the test DB
        # is torn down with the runner.
        run: |
          cat > .env <<EOF
          POSTGRES_USER=kisbooks
          POSTGRES_PASSWORD=ci-only-password
          POSTGRES_DB=kisbooks
          JWT_SECRET=ci-only-jwt-secret-at-least-20-chars
          ENCRYPTION_KEY=$(openssl rand -hex 32)
          PLAID_ENCRYPTION_KEY=$(openssl rand -hex 32)
          NODE_ENV=test
          CORS_ORIGIN=http://localhost:5173
          EOF
      - name: Bring up stack
        # Only the services the e2e suite needs — tailscale would try to
        # register against a tailnet and is irrelevant to the bookkeeping
        # flow. `--wait` blocks until every named service reports healthy
        # (or a 10m timeout). api has a 60s start_period for migrations,
        # so the first build can legitimately take a few minutes.
        run: docker compose -f docker-compose.yml up -d --wait db redis api web worker
      - name: Show api logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml logs api --tail=200
          docker compose -f docker-compose.yml ps
      - name: Run Playwright
        run: npx playwright test
        working-directory: e2e
      - name: Capture stack logs on test failure
        if: failure()
        run: |
          echo "::group::api logs"
          docker compose -f docker-compose.yml logs api --tail=500
          echo "::endgroup::"
          echo "::group::web logs"
          docker compose -f docker-compose.yml logs web --tail=200
          echo "::endgroup::"
          echo "::group::worker logs"
          docker compose -f docker-compose.yml logs worker --tail=200
          echo "::endgroup::"
      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.yml down -v
