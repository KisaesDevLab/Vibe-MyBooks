name: Secret scan

# Scans PRs and pushes for committed secrets (API keys, DB passwords,
# AWS keys, etc.). A committed .env or a stray API key in test data
# gets rewritten in minutes but stays visible in git history forever —
# this gate makes it harder to push one through.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so gitleaks can walk previous commits on a PR
          # — otherwise a secret introduced several commits back in the
          # branch slips through.
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
