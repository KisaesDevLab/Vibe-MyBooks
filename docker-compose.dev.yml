services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    volumes:
      # Source bind mounts for hot reload. The /data bind mount is inherited
      # from the base docker-compose.yml — don't duplicate it here.
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/api/src:/app/packages/api/src
    command: ["npx", "tsx", "watch", "packages/api/src/index.ts"]
    environment:
      NODE_ENV: development
      # Windows host -> Linux container bind mounts don't deliver inotify
      # events, so chokidar (used by tsx watch) misses file changes. Polling
      # is the reliable fallback on Docker Desktop for Windows.
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    volumes:
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/web/src:/app/packages/web/src
      - ./packages/web/index.html:/app/packages/web/index.html
      - ./packages/web/vite.config.ts:/app/packages/web/vite.config.ts
      - ./packages/web/tailwind.config.ts:/app/packages/web/tailwind.config.ts
      - ./packages/web/postcss.config.js:/app/packages/web/postcss.config.js
    environment:
      NODE_ENV: development
      VITE_API_URL: http://api:3001

  worker:
    volumes:
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/worker/src:/app/packages/worker/src
    command: ["npx", "tsx", "watch", "packages/worker/src/index.ts"]
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
